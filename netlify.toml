[build]
  command = "npm run build"
  publish = "dist"

# Set VITE_TELEGRAM_BOT_TOKEN and VITE_TELEGRAM_CHAT_ID
# in Netlify dashboard: Site settings > Environment variables
# Do NOT add them here — empty values override dashboard settings

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
